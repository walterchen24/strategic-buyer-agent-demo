name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile
        run: python -m compileall -q demo.py scripts tests
      - name: Test
        run: python -m unittest discover -s tests -v
      - name: Security scan
        run: python scripts/security_scan.py .
      - name: Reproduce committed example
        run: |
          python demo.py --output /tmp/completed_demo --approve
          diff -ru examples/completed_demo /tmp/completed_demo
